<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化配置 - Telegram 监控系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='js_css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .setup-wrapper {
            max-width: 520px;
            width: 100%;
            padding: 20px;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .brand-header .brand-icon {
            width: 56px;
            height: 56px;
            background-color: #0d6efd;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .brand-header .brand-icon i {
            font-size: 28px;
            color: #fff;
        }
        .brand-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #212529;
            margin-bottom: 4px;
        }
        .brand-header p {
            color: #6c757d;
            font-size: 14px;
            margin: 0;
        }
        .card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
        }
        .card-body {
            padding: 24px;
        }
        .form-label {
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        .form-control {
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13,110,253,.15);
        }
        .form-text {
            font-size: 12px;
            color: #999;
        }
        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
            border-radius: 6px;
            padding: 10px 0;
            font-size: 15px;
            font-weight: 500;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }
        .step-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #dee2e6;
        }
        .step-dot.active {
            background-color: #0d6efd;
            width: 24px;
            border-radius: 4px;
        }
        .footer-text {
            text-align: center;
            color: #adb5bd;
            font-size: 12px;
            margin-top: 16px;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #6c757d;
        }
        .form-control.has-icon {
            border-left: none;
        }
        .input-group .form-control:focus {
            border-color: #0d6efd;
            box-shadow: none;
        }
        .input-group:focus-within {
            box-shadow: 0 0 0 2px rgba(13,110,253,.15);
            border-radius: 6px;
        }
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="setup-wrapper">
        <!-- 品牌标识 -->
        <div class="brand-header">
            <div class="brand-icon">
                <i class="fab fa-telegram-plane"></i>
            </div>
            <h2>Telegram 监控系统</h2>
            <p>首次使用，请配置 Telegram API 信息</p>
        </div>

        <!-- 步骤指示 -->
        <div class="step-dots">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <!-- 提示信息 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert" style="font-size:14px; border-radius:6px;">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- 配置表单 -->
        <div class="card">
            <div class="card-body">
                <form action="{{ url_for('setup') }}" method="POST">
                    <div class="mb-3">
                        <label for="api_id" class="form-label">API ID</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key fa-sm"></i></span>
                            <input type="text" class="form-control has-icon" id="api_id" name="api_id"
                                   placeholder="例如：12345678" required pattern="[0-9]+">
                        </div>
                        <div class="form-text">在 <a href="https://my.telegram.org" target="_blank" style="color:#0d6efd;">my.telegram.org</a> 获取</div>
                    </div>

                    <div class="mb-3">
                        <label for="api_hash" class="form-label">API Hash</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock fa-sm"></i></span>
                            <input type="text" class="form-control has-icon" id="api_hash" name="api_hash"
                                   placeholder="例如：a1b2c3d4e5f6..." required minlength="10">
                        </div>
                        <div class="form-text">在 <a href="https://my.telegram.org" target="_blank" style="color:#0d6efd;">my.telegram.org</a> 获取</div>
                    </div>

                    <div class="mb-4">
                        <label for="phone_number" class="form-label">手机号码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone fa-sm"></i></span>
                            <input type="text" class="form-control has-icon" id="phone_number" name="phone_number"
                                   placeholder="+8612345678901" required>
                        </div>
                        <div class="form-text">带国际区号的手机号，以 + 开头</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-arrow-right me-1"></i> 保存配置
                    </button>
                </form>
            </div>
        </div>

        <p class="footer-text">
            <i class="fas fa-shield-alt me-1"></i> 配置将保存到数据库，重启后无需再次输入
        </p>
    </div>

    <script src="{{ url_for('static', filename='js_css/popper.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js_css/bootstrap.min.js') }}"></script>
</body>
</html>
