services:
  mysql:
    image: mysql:8.0
    container_name: telscan-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: telegram1
      MYSQL_USER: telegram1
      MYSQL_PASSWORD: "telegram&m910"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: telscan-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:8033"
    environment:
      - WEB_PORT=8033
      - FLASK_SECRET_KEY=change_me_to_random_string
      # 管理员密码（可选，不设置则自动生成随机密码）
      # - ADMIN_PASSWORD=your_admin_password

volumes:
  mysql_data:
